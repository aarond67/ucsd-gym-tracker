<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UCSD Gym Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 24px;
      background: #f5f7fb;
      color: #1f2937;
    }
    h1, h2, h3 {
      margin-top: 0;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
      margin-bottom: 24px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }
    .muted {
      color: #6b7280;
      font-size: 0.95rem;
    }
    pre {
      white-space: pre-wrap;
      word-wrap: break-word;
      margin: 0;
      font-family: inherit;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
    }
    th, td {
      text-align: left;
      padding: 10px 8px;
      border-bottom: 1px solid #e5e7eb;
      font-size: 0.95rem;
    }
    th {
      background: #f9fafb;
    }
    .facility-block {
      margin-bottom: 24px;
    }
    .charts {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }
    .chart-img {
      width: 100%;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
      background: white;
    }
    .pill {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: #eef2ff;
      font-size: 0.85rem;
      margin-bottom: 8px;
    }
    .error {
      color: #b91c1c;
      font-weight: 600;
    }
    .small {
      font-size: 0.9rem;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>UCSD Gym Dashboard</h1>
    <p class="muted">Auto-updated from GitHub Actions.</p>

    <div class="grid">
      <div class="card">
        <h2>Best Time Today</h2>
        <pre id="best-time-today">Loading...</pre>
      </div>

      <div class="card">
        <h2>Latest Occupancy Snapshot</h2>
        <div id="latest-snapshot">Loading...</div>
      </div>
    </div>

    <div class="card">
      <h2>Least Busy Times Summary</h2>
      <div id="summary-table">Loading...</div>
    </div>

    <div class="card" style="margin-top: 24px;">
      <h2>Facility Charts</h2>
      <div id="charts"></div>
    </div>
  </div>

  <script>
    function parseCSV(text) {
      const lines = text.trim().split("\n");
      if (lines.length < 2) return [];

      const headers = lines[0].split(",").map(h => h.trim());
      const rows = [];

      for (let i = 1; i < lines.length; i++) {
        const row = [];
        let current = "";
        let inQuotes = false;

        for (let j = 0; j < lines[i].length; j++) {
          const char = lines[i][j];
          if (char === '"') {
            inQuotes = !inQuotes;
          } else if (char === "," && !inQuotes) {
            row.push(current);
            current = "";
          } else {
            current += char;
          }
        }
        row.push(current);

        const obj = {};
        headers.forEach((h, idx) => obj[h] = row[idx] ?? "");
        rows.push(obj);
      }

      return rows;
    }

    async function loadTextFile(path, elementId) {
      try {
        const res = await fetch(path + "?t=" + Date.now());
        if (!res.ok) throw new Error("Could not load " + path);
        const text = await res.text();
        document.getElementById(elementId).textContent = text;
      } catch (err) {
        document.getElementById(elementId).innerHTML =
          `<span class="error">${err.message}</span>`;
      }
    }

    async function loadLatestSnapshot() {
      try {
        const res = await fetch("ucsd_occupancy_history.csv?t=" + Date.now());
        if (!res.ok) throw new Error("Could not load occupancy CSV");
        const text = await res.text();
        const rows = parseCSV(text);

        if (!rows.length) {
          document.getElementById("latest-snapshot").innerHTML =
            `<span class="error">No data found.</span>`;
          return;
        }

        const latestByFacility = {};
        for (const row of rows) {
          const facility = row.facility_name;
          const ts = row.timestamp;
          if (!latestByFacility[facility] || ts > latestByFacility[facility].timestamp) {
            latestByFacility[facility] = row;
          }
        }

        const ordered = Object.values(latestByFacility).sort((a, b) =>
          a.facility_name.localeCompare(b.facility_name)
        );

        let html = `<table>
          <thead>
            <tr>
              <th>Facility</th>
              <th>Status</th>
              <th>% Full</th>
              <th>Time</th>
            </tr>
          </thead>
          <tbody>`;

        for (const row of ordered) {
          html += `
            <tr>
              <td>${row.facility_name}</td>
              <td>${row.status}</td>
              <td>${row.percent_full}%</td>
              <td>${row.time}</td>
            </tr>
          `;
        }

        html += `</tbody></table>`;
        document.getElementById("latest-snapshot").innerHTML = html;
      } catch (err) {
        document.getElementById("latest-snapshot").innerHTML =
          `<span class="error">${err.message}</span>`;
      }
    }

    async function loadSummaryTable() {
      try {
        const res = await fetch("best_times_summary.csv?t=" + Date.now());
        if (!res.ok) throw new Error("Could not load best_times_summary.csv");
        const text = await res.text();
        const rows = parseCSV(text);

        if (!rows.length) {
          document.getElementById("summary-table").innerHTML =
            `<span class="error">No summary data found.</span>`;
          return;
        }

        let html = "";
        const grouped = {};

        for (const row of rows) {
          if (!grouped[row.facility_name]) grouped[row.facility_name] = [];
          grouped[row.facility_name].push(row);
        }

        for (const facility of Object.keys(grouped).sort()) {
          html += `<div class="facility-block">`;
          html += `<div class="pill">${facility}</div>`;
          html += `<table>
            <thead>
              <tr>
                <th>Day</th>
                <th>Hour</th>
                <th>Avg % Full</th>
              </tr>
            </thead>
            <tbody>`;

          for (const row of grouped[facility]) {
            const hour = Number(row.hour);
            const hourDisplay = `${hour % 12 || 12}:00 ${hour < 12 ? "AM" : "PM"}`;
            html += `
              <tr>
                <td>${row.day}</td>
                <td>${hourDisplay}</td>
                <td>${Number(row.avg_percent).toFixed(1)}%</td>
              </tr>
            `;
          }

          html += `</tbody></table></div>`;
        }

        document.getElementById("summary-table").innerHTML = html;
      } catch (err) {
        document.getElementById("summary-table").innerHTML =
          `<span class="error">${err.message}</span>`;
      }
    }

    async function imageExists(src) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => resolve(true);
        img.onerror = () => resolve(false);
        img.src = src;
      });
    }

    async function loadCharts() {
      const chartsDiv = document.getElementById("charts");
      const facilities = [
        "RIMAC_Fitness_Gym",
        "Main_Gym_Fitness_Gym",
        "Outback_Climbing_Center",
        "Triton_Esports_Center"
      ];

      let html = `<div class="charts">`;

      for (const facilityFile of facilities) {
        const title = facilityFile.replaceAll("_", " ");
        const hourly = `${facilityFile}_hourly.png?t=${Date.now()}`;
        const heatmap = `${facilityFile}_heatmap.png?t=${Date.now()}`;

        const hasHourly = await imageExists(hourly);
        const hasHeatmap = await imageExists(heatmap);

        if (!hasHourly && !hasHeatmap) continue;

        html += `<div class="facility-block">`;
        html += `<h3>${title}</h3>`;

        if (hasHourly) {
          html += `<img class="chart-img" src="${hourly}" alt="${title} hourly chart">`;
        } else {
          html += `<div class="small">Hourly chart not available yet.</div>`;
        }

        html += `<div style="height: 12px;"></div>`;

        if (hasHeatmap) {
          html += `<img class="chart-img" src="${heatmap}" alt="${title} heatmap">`;
        } else {
          html += `<div class="small">Heatmap not available yet.</div>`;
        }

        html += `</div>`;
      }

      html += `</div>`;
      chartsDiv.innerHTML = html;
    }

    async function init() {
      await loadTextFile("best_time_today.txt", "best-time-today");
      await loadLatestSnapshot();
      await loadSummaryTable();
      await loadCharts();
    }

    init();
  </script>
</body>
</html>

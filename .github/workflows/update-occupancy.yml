name: Update gym occupancy data

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

permissions:
  contents: write

jobs:
  update-csv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install scraper requirements
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pytz

      - name: Run scraper
        run: |
          # Replace this with your real scraper path.
          python scripts/scrape_gym.py

      - name: Commit updated CSV
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add public/data/gym_occupancy.csv
          git diff --cached --quiet || git commit -m "Update gym occupancy CSV"
          git push

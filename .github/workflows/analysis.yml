name: Gym Analysis

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pandas matplotlib

      - name: Run analysis
        env:
          PYTHONUNBUFFERED: "1"
        run: python best_times_analysis.py

      - name: Commit updated analysis files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add *.png best_times_summary.csv best_time_today.txt
          git diff --cached --quiet || git commit -m "update analysis graphs"
          git push
